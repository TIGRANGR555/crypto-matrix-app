name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk xclip libffi-dev libssl-dev autoconf libtool pkg-config cmake zlib1g-dev python3-pip aidl libstdc++6 wget

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" cython setuptools

    - name: Manually Pre-Install Correct Android NDK (r25c)
      run: |
        mkdir -p /home/runner/android-ndk
        cd /home/runner/android-ndk
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        rm android-ndk-r25c-linux.zip

    - name: Build APK
      run: |
        buildozer --unattended android debug
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "y"
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "24"
        # Force the exact path to the manually installed NDK r25c
        ANDROIDNDK: "/home/runner/android-ndk/android-ndk-r25c"
