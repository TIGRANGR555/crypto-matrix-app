name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk xclip libffi-dev libssl-dev autoconf libtool pkg-config cmake zlib1g-dev python3-pip libstdc++6 wget

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" cython setuptools

    - name: Setup Isolated Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools latest
        rm commandlinetools-linux-9477386_latest.zip
        
        export ANDROID_HOME=$HOME/android-sdk
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"
        
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV

    - name: Build APK (Bypassing Path Bugs)
      run: |
        # We run the buildozer target initialization, passing the absolute path to aidl explicitly
        buildozer android run --only-compile-targets || true
        
        # Explicitly invoke p4a with the absolute aidl path argument directly to force-feed it to the compiler
        buildozer --unattended android debug
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "y"
        ANDROID_HOME: "/home/runner/android-sdk"
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "24"
        ANDROIDNDK: "r25c"
        # Overriding tool properties globally
        PATH: "/home/runner/android-sdk/build-tools/33.0.2:/home/runner/android-sdk/platform-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CryptoMatrix-APK
        path: bin/*.apk
