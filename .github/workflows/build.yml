name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk xclip libffi-dev libssl-dev autoconf libtool pkg-config cmake zlib1g-dev python3-pip libstdc++6 wget

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" cython setuptools

    - name: Setup Isolated Android SDK & Link Aidl
      run: |
        # 1. Create directory structures for the Android SDK
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        
        # 2. Download and unzip Google command line utilities
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
        unzip -q commandlinetools-linux-9477386_latest.zip
        mv cmdline-tools latest
        rm commandlinetools-linux-9477386_latest.zip
        
        # 3. Export clean environmental paths
        echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
        echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
        
        # 4. Install explicit SDK platforms and Build Tools
        export ANDROID_HOME=$HOME/android-sdk
        yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
        $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"
        
        # 5. FIX FOR "Aidl not found": Symlink aidl into the platform-tools folder where Buildozer looks
        ln -s $HOME/android-sdk/build-tools/33.0.2/aidl $HOME/android-sdk/platform-tools/aidl
        
        # 6. Add build-tools folder explicitly to the pipeline PATH
        echo "$HOME/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH

    - name: Build APK with Controlled Toolchain
      run: |
        buildozer --unattended android debug
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "y"
        ANDROID_HOME: "/home/runner/android-sdk"
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "24"
        ANDROIDNDK: "r25c"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CryptoMatrix-APK
        path: bin/*.apk
