name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Buildozer Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk xclip libffi-dev libssl-dev autoconf libtool pkg-config cmake zlib1g-dev python3-pip libstdc++6 wget

    - name: Install Buildozer and Cython
      run: |
        pip install --upgrade pip
        pip install "buildozer>=1.5.0" cython setuptools

    - name: Install Android Build Tools (Fixes Missing Aidl)
      run: |
        # Use the pre-installed SDK manager to fetch the correct build tools containing aidl
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;34.0.0"
        
        # Add the newly installed build-tools folder directly to the system PATH so buildozer finds aidl instantly
        echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

    - name: Build APK
      run: |
        buildozer --unattended android debug
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "y"
        ANDROIDAPI: "33"
        ANDROIDMINAPI: "24"
        ANDROIDNDK: "r25c"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CryptoMatrix-APK
        path: bin/*.apk
